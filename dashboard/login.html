<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Intelligent OS Log Analysis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-950 flex items-center justify-center h-screen overflow-hidden">
    <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none opacity-20">
        <div class="absolute -top-24 -left-24 w-96 h-96 bg-blue-600 rounded-full blur-[120px]"></div>
        <div class="absolute top-1/2 -right-24 w-80 h-80 bg-indigo-600 rounded-full blur-[100px]"></div>
    </div>

    <div class="w-full max-w-md p-8 relative z-10">
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center p-3 bg-blue-600 rounded-2xl shadow-lg shadow-blue-500/20 mb-4">
                <i data-lucide="activity" class="w-8 h-8 text-white"></i>
            </div>
            <h1 class="text-3xl font-bold text-white tracking-tight">LogAnalyzer</h1>
            <p class="text-slate-400 mt-2">Intelligent OS Monitoring Platform</p>
        </div>

        <div class="bg-slate-900/50 backdrop-blur-xl border border-slate-800 p-8 rounded-3xl shadow-2xl">
            <h2 class="text-xl font-semibold text-white mb-6">Sign In</h2>
            
            <form id="login-form" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-2">Username</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500">
                            <i data-lucide="user" class="w-4 h-4"></i>
                        </span>
                        <input type="text" name="username" required 
                            class="w-full bg-slate-800/50 border border-slate-700 rounded-xl py-3 pl-11 pr-4 text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all placeholder:text-slate-600"
                            placeholder="Enter your username">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-2">Password</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500">
                            <i data-lucide="lock" class="w-4 h-4"></i>
                        </span>
                        <input type="password" name="password" required 
                            class="w-full bg-slate-800/50 border border-slate-700 rounded-xl py-3 pl-11 pr-4 text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all placeholder:text-slate-600"
                            placeholder="••••••••">
                    </div>
                </div>

                <div id="error-message" class="hidden bg-red-500/10 border border-red-500/20 text-red-400 text-sm p-3 rounded-xl flex items-center space-x-2">
                    <i data-lucide="alert-circle" class="w-4 h-4"></i>
                    <span>Invalid credentials, please try again.</span>
                </div>

                <button type="submit" 
                    class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl shadow-lg shadow-blue-500/20 transition-all active:scale-95 flex items-center justify-center space-x-2">
                    <span>Sign In</span>
                    <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </button>
            </form>
            
            <div class="mt-8 pt-6 border-t border-slate-800 text-center">
                <p class="text-slate-500 text-xs">
                    Production monitoring system for authorized personnel only.
                </p>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const form = document.getElementById('login-form');
        const errorEl = document.getElementById('error-message');

        form.onsubmit = async (e) => {
            e.preventDefault();
            errorEl.classList.add('hidden');
            
            const formData = new FormData(form);
            const response = await fetch('/login', {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                window.location.href = '/';
            } else {
                errorEl.classList.remove('hidden');
            }
        };
    </script>
</body>
</html>

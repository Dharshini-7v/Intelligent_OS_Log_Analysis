services:
  # MySQL Database
  - type: database
    name: intelligent-log-db
    databaseName: intelligent_log_analysis
    user: log_analyzer
    plan: free # Note: Render free database expires after 90 days

  # FastAPI Web Service
  - type: web
    name: intelligent-log-analysis
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: intelligent-log-db
          property: connectionString
      - key: DB_HOST
        fromDatabase:
          name: intelligent-log-db
          property: host
      - key: DB_USER
        fromDatabase:
          name: intelligent-log-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: intelligent-log-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: intelligent-log-db
          property: database
      - key: DB_PORT
        fromDatabase:
          name: intelligent-log-db
          property: port
